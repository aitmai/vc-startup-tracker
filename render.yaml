services:
  - type: web
    name: vc-startup-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: AIRTABLE_TOKEN
        sync: false
      - key: AIRTABLE_BASE_ID
        value: appWQNv1G6y9m8CM6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
